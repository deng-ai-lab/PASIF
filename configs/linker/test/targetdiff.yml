

model:
  type: targetdiff
  checkpoint: ./logs/denovo/targetdiff/pretrain/checkpoints/pretrained.pt

predictor: !include /home/lfj/projects_dir/tyl/Molcular/CBGBench-master/configs/classifier/prop_add_aromatic.yml

data:
  test: 
    name: pl_decomp
    version: linker
    raw_path: ./raw_data/crossdocked_v1.1_rmsd1.0_pocket10
    split_path: ./data/split_by_name_10m.pt
    transform:
      - type: choose_ctx_gen
        sampling: fix_zero

      - type: featurize_protein_fa
      - type: remove_ligand_gen
        mode: add_aromatic

      - type: assign_gensize
        distribution: prior_distcond
      - type: assign_genatomtype
        distribution: uniform
        mode: add_aromatic
      
      - type: center_pos
        center_flag: ligand
        mask_flag: ctx_flag
      - type: assign_genpos
        distribution: gaussian

      - type: merge
        keys: 
          - protein
          - ligand
        excluded_subkeys:
          - gen_bond_index
          - gen_bond_type
          - bond_index
          - bond_type
          - ctx_bond_index
          - ctx_bond_type
          - gen_index
          - ctx_index
          - cross_bond_index
          - cross_bond_type


  follow_batch: 
    - protein_element
    - ligand_element

sampling:
  seed: 2022
  num_samples: 50
  translate: true

reconstruct:
  basic_mode: false

sampler:
  type: gvptransformer
  node_feat_dim: 128
  vec_feat_dim: 64
  num_layers: 5
  num_classes: 13
  ckpt: ./logs/linker/targetdiff/selftrain-128-64-5/checkpoints/176000.pt