model:
  checkpoint: ./logs/scaffold/delete/pretrain/checkpoints/cross_val_119.pt
  # checkpoint: ./logs/f2l/delete/pretrain/checkpoints/delete.pt

sample:
  seed: 2023
  mask_init: True
  num_samples: 100
  beam_size: 500
  max_steps: 50
  threshold:
    focal_threshold: 0.5
    pos_threshold: 0.25
    element_threshold: 0.3
    hasatom_threshold: 0.6
    bond_threshold: 0.4

transform:
    mask:
      type: scaffold_single

dataset:
  version: scaffold
  raw_path: ../datasets/crossdocked_v1.1_rmsd1.0_pocket10
  name: pl
  path: ./data/pl_del/crossdocked_pocket10