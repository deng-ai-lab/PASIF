# resume: ./logs/affinity/diffsbdd/self-train/checkpoints/98000.pt
train:
  seed: 2025
  batch_size: 32
  max_iters: 1000000
  max_grad_norm: 8.0
  optimizer:
    type: adam
    lr: 5.e-4
    weight_decay: 0.0
    beta1: 0.95
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.6
    patience: 10
    min_lr: 1.e-6
  report_freq: 100

data:
  # name: classifier_pl
  # path: ./data/pl/crossdocked_v1.1_rmsd1.0_pocket10
  # split:  ./data/pl/split_by_name_10m.pt
  train: 
    name: classifier_pl
    raw_path: ./raw_data/crossdocked_v1.1_rmsd1.0_pocket10
    path: ./data/classifier/crossdocked_v1.1_rmsd1.0_pocket10
    split_path: ./data/classifier/crossdocked_pocket10_pose_split.pt
    transform:
      - type: featurize_protein_fa
      - type: featurize_ligand_fa
        mode: basic
      - type: center_whole_pos
      - type: merge
        keys:
          - protein
          - ligand
  follow_batch: 
    - protein_element
    - ligand_element

model:
  type: diffsbdd
  encoder:
    type: gvptransformer
    node_feat_dim: 128
    vec_feat_dim: 32
    num_layers: 5
    num_classes: 1
    cutoff_mode: knn
    k: 16
  embedder:
    emb_dim: 128 
    atom:
      type: linear
    residue:
      type: linear

eval:
  val_freq: 1000
  metrics:
    - name: spearman
      true_key: label
      pred_key: pred
    - name: pearson
      true_key: label
      pred_key: pred
